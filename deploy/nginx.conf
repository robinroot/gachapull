# =============================================
#   Nginx Config for GachaPull
#   Salin ke: /etc/nginx/sites-available/gachapull
#   Lalu: sudo ln -s /etc/nginx/sites-available/gachapull /etc/nginx/sites-enabled/
# =============================================

server {
    listen 80;
    # listen [::]:80;  # Aktifkan jika VPS mendukung IPv6

    # Ganti dengan domain atau IP VPS kamu
    server_name yourdomain.com www.yourdomain.com;

    # Static frontend (React build output)
    root /var/www/gachapull/artifacts/gacha-web/dist/public;
    index index.html;

    # Uploaded files (card images, etc.)
    location /uploads/ {
        alias /var/www/gachapull/artifacts/api-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy semua request /api ke Express backend
    location /api {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # SPA fallback — semua route non-API ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy       "no-referrer-when-downgrade" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}

